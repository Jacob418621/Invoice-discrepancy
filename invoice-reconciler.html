<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Reconciler</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #000;
      padding: 20px;
    }

    .container { max-width: 1400px; margin: 0 auto; }

    header {
      border-bottom: 3px solid #000;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    header h1 { font-size: 2rem; font-weight: 900; letter-spacing: -1px; }
    header p { margin-top: 4px; color: #555; font-size: 0.95rem; }

    /* ── Upload panels ── */
    .upload-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 30px;
    }

    .panel {
      border: 2px solid #000;
      border-radius: 4px;
      padding: 20px;
    }

    .panel h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }

    .drop-zone {
      border: 2px dashed #bbb;
      border-radius: 4px;
      padding: 36px 20px;
      text-align: center;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      background: #fafafa;
    }
    .drop-zone.dragging { background: #f0f0f0; border-color: #000; }
    .drop-zone.loaded  { border-color: #000; background: #f8fff8; }
    .drop-zone p { color: #555; font-size: 0.9rem; margin-top: 6px; }
    .drop-zone input[type=file] { display: none; }

    .drop-icon { font-size: 2.5rem; }

    .file-name {
      margin-top: 10px;
      font-weight: 600;
      font-size: 0.85rem;
      word-break: break-all;
    }

    /* ── Column mapping ── */
    .mapping-section {
      display: none;
      margin-bottom: 30px;
    }
    .mapping-section.visible { display: block; }

    .mapping-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .mapping-panel {
      border: 2px solid #000;
      border-radius: 4px;
      padding: 20px;
    }
    .mapping-panel h3 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; }

    .map-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .map-row label { width: 120px; font-size: 0.85rem; font-weight: 600; flex-shrink: 0; }
    .map-row select {
      flex: 1;
      border: 1.5px solid #000;
      border-radius: 3px;
      padding: 5px 8px;
      font-size: 0.85rem;
      background: #fff;
    }

    /* ── Actions ── */
    .actions { margin-bottom: 30px; display: flex; gap: 12px; flex-wrap: wrap; }

    button {
      padding: 10px 22px;
      border: 2px solid #000;
      border-radius: 3px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      background: #000;
      color: #fff;
      transition: background 0.15s;
    }
    button:hover { background: #333; }
    button.secondary { background: #fff; color: #000; }
    button.secondary:hover { background: #f0f0f0; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Results ── */
    .results { display: none; }
    .results.visible { display: block; }

    .summary-bar {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .stat {
      border: 2px solid #000;
      border-radius: 4px;
      padding: 12px 20px;
      min-width: 140px;
    }
    .stat .num { font-size: 1.8rem; font-weight: 900; }
    .stat .lbl { font-size: 0.75rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
    .stat.warn { border-color: #c00; }
    .stat.warn .num { color: #c00; }
    .stat.ok { border-color: #080; }
    .stat.ok .num { color: #080; }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border: 2px solid #000;
      border-radius: 4px;
      overflow: hidden;
      width: fit-content;
    }
    .filter-tabs button {
      border: none;
      border-radius: 0;
      border-right: 2px solid #000;
      padding: 8px 18px;
      font-size: 0.82rem;
      background: #fff;
      color: #000;
    }
    .filter-tabs button:last-child { border-right: none; }
    .filter-tabs button.active { background: #000; color: #fff; }

    /* Table */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.83rem;
    }
    th {
      background: #000;
      color: #fff;
      padding: 9px 12px;
      text-align: left;
      font-weight: 700;
      white-space: nowrap;
    }
    td {
      padding: 8px 12px;
      border-bottom: 1px solid #ddd;
      vertical-align: top;
    }
    tr:hover td { background: #f9f9f9; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 700;
      white-space: nowrap;
    }
    .badge-ok      { background: #d4edda; color: #155724; }
    .badge-price   { background: #fff3cd; color: #856404; }
    .badge-qty     { background: #cce5ff; color: #004085; }
    .badge-missing { background: #f8d7da; color: #721c24; }
    .badge-extra   { background: #e2d9f3; color: #3d1a78; }

    .diff-val { font-weight: 700; }
    .diff-pos { color: #080; }
    .diff-neg { color: #c00; }

    /* Preview tables */
    .preview-section { margin-bottom: 30px; }
    .preview-section h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
    .preview-table-wrap { overflow-x: auto; max-height: 260px; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; }
    .preview-table-wrap table th { font-size: 0.75rem; padding: 6px 10px; }
    .preview-table-wrap table td { font-size: 0.75rem; padding: 5px 10px; }

    .error-msg { color: #c00; font-size: 0.85rem; margin-top: 8px; font-weight: 600; }

    @media (max-width: 700px) {
      .upload-grid, .mapping-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Invoice Reconciler</h1>
    <p>Drop in your invoice and cost sheet to find discrepancies.</p>
  </header>

  <!-- Upload panels -->
  <div class="upload-grid">
    <div class="panel">
      <h2>Invoice</h2>
      <div class="drop-zone" id="invoiceZone">
        <div class="drop-icon">📄</div>
        <strong>Drop invoice here</strong>
        <p>PDF, Excel (.xlsx/.xls), or CSV</p>
        <p id="invoiceFileName" class="file-name"></p>
        <p id="invoiceError" class="error-msg"></p>
        <input type="file" id="invoiceFile" accept=".pdf,.xlsx,.xls,.csv" />
      </div>
    </div>
    <div class="panel">
      <h2>Cost Sheet</h2>
      <div class="drop-zone" id="costZone">
        <div class="drop-icon">📋</div>
        <strong>Drop cost sheet here</strong>
        <p>PDF, Excel (.xlsx/.xls), or CSV</p>
        <p id="costFileName" class="file-name"></p>
        <p id="costError" class="error-msg"></p>
        <input type="file" id="costFile" accept=".pdf,.xlsx,.xls,.csv" />
      </div>
    </div>
  </div>

  <!-- Column mapping -->
  <div class="mapping-section" id="mappingSection">
    <div class="mapping-grid">
      <div class="mapping-panel" id="invoiceMapping">
        <h3>Invoice — Map Columns</h3>
        <!-- populated by JS -->
      </div>
      <div class="mapping-panel" id="costMapping">
        <h3>Cost Sheet — Map Columns</h3>
        <!-- populated by JS -->
      </div>
    </div>
    <div style="margin-top:16px;">
      <button id="compareBtn" disabled>Compare</button>
      <button class="secondary" id="resetBtn" style="margin-left:8px;">Reset</button>
    </div>
  </div>

  <!-- Results -->
  <div class="results" id="results">
    <div class="summary-bar" id="summaryBar"></div>
    <div class="filter-tabs" id="filterTabs"></div>
    <div class="table-wrap">
      <table id="resultsTable">
        <thead id="resultsHead"></thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── State ──────────────────────────────────────────────────────────────────
  const state = {
    invoice: { rows: [], headers: [], file: null },
    cost:    { rows: [], headers: [], file: null },
  };

  // ── Drop zones ─────────────────────────────────────────────────────────────
  setupDropZone('invoiceZone', 'invoiceFile', 'invoice', 'invoiceFileName', 'invoiceError');
  setupDropZone('costZone',    'costFile',    'cost',    'costFileName',    'costError');

  function setupDropZone(zoneId, inputId, key, nameId, errId) {
    const zone  = document.getElementById(zoneId);
    const input = document.getElementById(inputId);

    zone.addEventListener('click', () => input.click());
    input.addEventListener('change', () => input.files[0] && loadFile(input.files[0], key, nameId, errId, zone));

    zone.addEventListener('dragover',  e => { e.preventDefault(); zone.classList.add('dragging'); });
    zone.addEventListener('dragleave', ()=> zone.classList.remove('dragging'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('dragging');
      const f = e.dataTransfer.files[0];
      if (f) loadFile(f, key, nameId, errId, zone);
    });
  }

  async function loadFile(file, key, nameId, errId, zone) {
    document.getElementById(errId).textContent = '';
    document.getElementById(nameId).textContent = 'Loading…';
    try {
      const setStatus = msg => { document.getElementById(nameId).textContent = msg; };
      const { headers, rows } = await parseFile(file, setStatus);
      state[key].headers = headers;
      state[key].rows    = rows;
      state[key].file    = file;
      document.getElementById(nameId).textContent = `✓ ${file.name} — ${rows.length} rows`;
      zone.classList.add('loaded');
      maybeShowMapping();
    } catch(e) {
      const msg = e.message || String(e);
      document.getElementById(errId).textContent = `Error: ${msg}`;
      console.error('Invoice load error:', e);
      document.getElementById(nameId).textContent = '';
      zone.classList.remove('loaded');
    }
  }

  // ── File parsers ───────────────────────────────────────────────────────────
  async function parseFile(file, setStatus) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'pdf')                return parsePDF(file, setStatus);
    if (ext === 'csv')                return parseCSV(file);
    if (ext === 'xlsx' || ext === 'xls') return parseExcel(file);
    throw new Error('Unsupported file type. Use PDF, CSV, or Excel.');
  }

  async function parsePDF(file, setStatus) {
    const buf = await file.arrayBuffer();
    const doc = await pdfjsLib.getDocument({ data: buf }).promise;
    const allLines = [];

    for (let p = 1; p <= doc.numPages; p++) {
      const page    = await doc.getPage(p);
      const content = await page.getTextContent();

      // Group items by Y with a tolerance of 5pt so items on the same visual
      // row (which can differ slightly in Y) land in the same bucket.
      const groups = [];
      for (const item of content.items) {
        const y    = item.transform[5];
        const x    = item.transform[4];
        const text = item.str.trim();
        if (!text) continue;
        const grp = groups.find(g => Math.abs(g.y - y) <= 5);
        if (grp) {
          grp.items.push({ x, text });
        } else {
          groups.push({ y, items: [{ x, text }] });
        }
      }

      // Top-to-bottom order; within each row left-to-right
      groups.sort((a, b) => b.y - a.y);
      for (const g of groups) {
        g.items.sort((a, b) => a.x - b.x);
        const row = g.items.map(i => i.text).filter(Boolean);
        if (row.length > 0) allLines.push(row);
      }
    }

    // If pdf.js found no text this is a scanned/image PDF — fall back to OCR
    if (allLines.length === 0) {
      if (setStatus) setStatus('Scanned PDF detected — running OCR (this may take 30–60 s)…');
      return parsePDFWithOCR(doc, setStatus);
    }

    return structureLines(allLines);
  }

  // Render each PDF page to a canvas and run Tesseract OCR on it
  async function parsePDFWithOCR(doc, setStatus) {
    const allLines = [];

    for (let p = 1; p <= doc.numPages; p++) {
      if (setStatus) setStatus(`OCR: rendering page ${p} of ${doc.numPages}…`);

      const page     = await doc.getPage(p);
      const viewport = page.getViewport({ scale: 2.5 });
      const canvas   = document.createElement('canvas');
      canvas.width   = viewport.width;
      canvas.height  = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

      if (setStatus) setStatus(`OCR: reading page ${p} of ${doc.numPages} (may take ~30s)…`);

      // Tesseract.js v5 simple API — no worker setup needed
      const result = await Tesseract.recognize(canvas, 'eng', {
        logger: m => {
          if (setStatus && m.status === 'recognizing text') {
            setStatus(`OCR page ${p}: ${Math.round((m.progress || 0) * 100)}%…`);
          }
        }
      });

      // Group words into rows by y-midpoint with 10px tolerance
      const words = (result.data.words || []).filter(w => w.text && w.text.trim());
      const groups = [];
      for (const w of words) {
        const yMid = (w.bbox.y0 + w.bbox.y1) / 2;
        const grp  = groups.find(g => Math.abs(g.y - yMid) <= 10);
        if (grp) {
          grp.items.push({ x: w.bbox.x0, text: w.text.trim() });
        } else {
          groups.push({ y: yMid, items: [{ x: w.bbox.x0, text: w.text.trim() }] });
        }
      }
      groups.sort((a, b) => a.y - b.y);
      for (const g of groups) {
        g.items.sort((a, b) => a.x - b.x);
        const row = g.items.map(i => i.text).filter(Boolean);
        if (row.length > 0) allLines.push(row);
      }
    }

    if (allLines.length === 0) throw new Error('OCR found no text. Try a clearer scan or export the invoice as a digital PDF.');
    return structureLines(allLines);
  }

  // Shared: find header row and build structured rows from raw line arrays
  function structureLines(allLines) {
    // Find the header row by scoring against known invoice column keywords.
    const headerKeywords = ['quantity','description','unit price','total price','unit','total','item'];
    let headerIdx = -1;
    let bestScore = 0;
    for (let i = 0; i < Math.min(allLines.length, 40); i++) {
      const rowText = allLines[i].join(' ').toLowerCase();
      const score   = headerKeywords.filter(kw => rowText.includes(kw)).length;
      if (score > bestScore) { bestScore = score; headerIdx = i; }
    }
    // Fallback: row with most columns
    if (headerIdx === -1 || bestScore < 2) {
      const maxCols = Math.max(...allLines.map(r => r.length));
      headerIdx = allLines.findIndex(r => r.length === maxCols);
    }

    const headers = allLines[headerIdx];

    // Skip note-only rows (Prop. 65 warnings, etc.) that would misalign columns
    const dataLines = allLines.slice(headerIdx + 1).filter(r => {
      if (r.length < 2) return false;
      const hasNum = r.some(t => /\d/.test(t));
      return hasNum || r.length >= 4;
    });

    const rows = dataLines.map(r => {
      const obj = {};
      headers.forEach((h, i) => { obj[h] = r[i] ?? ''; });
      return obj;
    });

    return { headers, rows };
  }

  function parseCSV(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const text  = e.target.result;
          const lines = text.split(/\r?\n/).filter(l => l.trim());
          const parse = line => {
            const res = []; let cur = ''; let inQ = false;
            for (const ch of line) {
              if (ch === '"') { inQ = !inQ; }
              else if (ch === ',' && !inQ) { res.push(cur.trim()); cur = ''; }
              else cur += ch;
            }
            res.push(cur.trim());
            return res;
          };
          const headers = parse(lines[0]);
          const rows = lines.slice(1).map(l => {
            const vals = parse(l);
            const obj = {};
            headers.forEach((h, i) => { obj[h] = vals[i] ?? ''; });
            return obj;
          });
          resolve({ headers, rows });
        } catch(e) { reject(e); }
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsText(file);
    });
  }

  function parseExcel(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const wb = XLSX.read(e.target.result, { type: 'array' });

          // Combine all sheets into one dataset, tagging each row with its sheet name
          const allRows = [];
          const headerSet = new Set();

          for (const sheetName of wb.SheetNames) {
            const ws   = wb.Sheets[sheetName];
            const data = XLSX.utils.sheet_to_json(ws, { defval: '', header: 1 });
            if (data.length < 2) continue;

            // Find the header row: first row that has more than 1 non-empty cell
            let hdrIdx = 0;
            for (let i = 0; i < Math.min(data.length, 10); i++) {
              const nonempty = data[i].filter(c => String(c).trim()).length;
              if (nonempty >= 2) { hdrIdx = i; break; }
            }

            const rawHeaders = data[hdrIdx].map((h, i) => {
              const s = String(h).trim();
              return s || `Col${i}`;
            });
            rawHeaders.forEach(h => headerSet.add(h));

            // Category-only rows to skip (single non-empty cell, no price)
            const CATEGORY_NAMES = /^(candy|chocolate|fruits?|nuts?|seeds?|dried|snacks?|mixes?|other)$/i;

            for (let i = hdrIdx + 1; i < data.length; i++) {
              const rowArr = data[i];
              const obj = {};
              rawHeaders.forEach((h, ci) => { obj[h] = String(rowArr[ci] ?? '').trim(); });

              // Skip blank rows and category-header rows
              const vals = Object.values(obj).filter(v => v);
              if (vals.length === 0) continue;
              if (vals.length === 1 && CATEGORY_NAMES.test(vals[0])) continue;
              // Skip rows where the only populated cell is a section title (no digits anywhere)
              if (!vals.some(v => /\d/.test(v))) continue;

              obj['__sheet'] = sheetName;
              allRows.push(obj);
            }
          }

          const headers = [...headerSet].filter(h => !h.startsWith('Col'));
          if (allRows.length === 0) throw new Error('No data rows found in Excel file.');
          resolve({ headers, rows: allRows });
        } catch(e) { reject(e); }
      };
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsArrayBuffer(file);
    });
  }

  // ── Column mapping UI ──────────────────────────────────────────────────────
  const FIELDS = [
    { key: 'itemNo',      label: 'Item # (for matching)' },
    { key: 'description', label: 'Description' },
    { key: 'qty',         label: 'Quantity' },
    { key: 'unitPrice',   label: 'Unit Price / Cost' },
    { key: 'total',       label: 'Line Total' },
  ];

  function maybeShowMapping() {
    if (!state.invoice.headers.length || !state.cost.headers.length) return;
    buildMappingPanel('invoiceMapping', 'invoice', 'Invoice');
    buildMappingPanel('costMapping',    'cost',    'Cost Sheet');
    document.getElementById('mappingSection').classList.add('visible');
    document.getElementById('results').classList.remove('visible');
    document.getElementById('compareBtn').disabled = false;
  }

  function buildMappingPanel(panelId, key, label) {
    const panel   = document.getElementById(panelId);
    const headers = state[key].headers;
    panel.innerHTML = `<h3>${label} — Map Columns</h3>`;

    for (const field of FIELDS) {
      const row = document.createElement('div');
      row.className = 'map-row';

      const lbl = document.createElement('label');
      lbl.textContent = field.label;

      const sel = document.createElement('select');
      sel.id = `map_${key}_${field.key}`;
      sel.innerHTML = `<option value="">(none)</option>` +
        headers.map(h => `<option value="${esc(h)}"${autoMatch(h, field.key) ? ' selected' : ''}>${esc(h)}</option>`).join('');

      row.appendChild(lbl);
      row.appendChild(sel);
      panel.appendChild(row);
    }
  }

  function autoMatch(header, fieldKey) {
    const h = header.toLowerCase().replace(/[^a-z]/g, '');
    const matchers = {
      itemNo:      ['itemno','item','cgn','sku','code','partno','partnumber','itemnumber'],
      description: ['description','desc','product','name','service','detail'],
      qty:         ['qty','quantity','units','count'],
      unitPrice:   ['unitprice','price','rate','cost','each','perprice'],
      total:       ['totalprice','linetotal','extended','ext','totalamount'],
    };
    if (fieldKey === 'total' && h === 'total') return true;
    return (matchers[fieldKey] || []).some(m => h.includes(m));
  }

  function getMapping(key) {
    const m = {};
    for (const field of FIELDS) {
      m[field.key] = document.getElementById(`map_${key}_${field.key}`)?.value || '';
    }
    return m;
  }

  // ── Compare ────────────────────────────────────────────────────────────────
  document.getElementById('compareBtn').addEventListener('click', compare);
  document.getElementById('resetBtn').addEventListener('click', () => location.reload());

  function compare() {
    const invMap  = getMapping('invoice');
    const costMap = getMapping('cost');

    if (!invMap.description || !costMap.description) {
      alert('Please map at least the "Description / Item" column for both files.');
      return;
    }

    const invItems  = normaliseRows(state.invoice.rows, invMap);
    const costItems = normaliseRows(state.cost.rows,    costMap);

    // Build lookup by item# (preferred) and by description (fallback)
    const costByItem = {};
    const costByDesc = {};
    for (const item of costItems) {
      if (item.itemNo) costByItem[norm(item.itemNo)] = item;
      costByDesc[norm(item.description)] = item;
    }

    const useItemNo = invItems.some(r => r.itemNo) && costItems.some(r => r.itemNo);

    const results = [];

    for (const inv of invItems) {
      const cost = useItemNo && inv.itemNo
        ? (costByItem[norm(inv.itemNo)] || costByDesc[norm(inv.description)])
        : costByDesc[norm(inv.description)];

      if (!cost) {
        results.push({ ...inv, status: 'missing', note: 'Not found in cost sheet' });
        continue;
      }

      const issues = [];
      let status = 'ok';

      if (inv.unitPrice !== null && cost.unitPrice !== null) {
        const diff = inv.unitPrice - cost.unitPrice;
        if (Math.abs(diff) > 0.01) {
          issues.push({ field: 'Unit Price', inv: inv.unitPrice, cost: cost.unitPrice, diff });
          status = 'price';
        }
      }

      if (inv.qty !== null && cost.qty !== null) {
        const diff = inv.qty - cost.qty;
        if (Math.abs(diff) > 0.001) {
          if (status === 'price') status = 'both';
          else status = 'qty';
          issues.push({ field: 'Quantity', inv: inv.qty, cost: cost.qty, diff });
        }
      }

      if (inv.total !== null && cost.total !== null) {
        const diff = inv.total - cost.total;
        if (Math.abs(diff) > 0.01) {
          if (!issues.find(i => i.field === 'Unit Price') && !issues.find(i => i.field === 'Quantity')) {
            status = 'price';
          }
          issues.push({ field: 'Line Total', inv: inv.total, cost: cost.total, diff });
        }
      }

      results.push({ ...inv, costRow: cost, status, issues });
      // Remove matched item from both lookups
      if (useItemNo && inv.itemNo) delete costByItem[norm(inv.itemNo)];
      delete costByDesc[norm(inv.description)];
    }

    // Remaining cost items not matched to any invoice line
    const seen = new Set();
    for (const item of [...Object.values(costByItem), ...Object.values(costByDesc)]) {
      const k = norm(item.itemNo || item.description);
      if (seen.has(k)) continue;
      seen.add(k);
      results.push({ ...item, status: 'extra', note: 'In cost sheet but not in invoice' });
    }

    renderResults(results);
  }

  function normaliseRows(rows, mapping) {
    return rows.map(r => ({
      itemNo:      String(r[mapping.itemNo] ?? '').trim(),
      description: String(r[mapping.description] ?? '').trim(),
      qty:         parseNum(r[mapping.qty]),
      unitPrice:   parseNum(r[mapping.unitPrice]),
      total:       parseNum(r[mapping.total]),
      _raw: r,
    })).filter(r => r.description.trim() || r.itemNo.trim());
  }

  function parseNum(val) {
    if (val === undefined || val === null || val === '') return null;
    const s = String(val);
    // Extract the last number in the string — handles "$6.25lb", "N/A- $3lb", "110.00 Cs"
    const match = s.match(/(\d[\d.,]*)\s*(?:lb|lbs|oz|kg|Cs|cs|CS|EA|ea|each)?$/i)
                || s.match(/\d[\d.,]*/);
    if (!match) return null;
    const n = parseFloat(match[0].replace(/,/g, ''));
    return isNaN(n) ? null : n;
  }

  function norm(str) {
    return String(str).toLowerCase().replace(/\s+/g, ' ').trim();
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  let currentFilter = 'all';

  function renderResults(results) {
    window._results = results;

    const counts = {
      all:     results.length,
      ok:      results.filter(r => r.status === 'ok').length,
      price:   results.filter(r => r.status === 'price' || r.status === 'both').length,
      qty:     results.filter(r => r.status === 'qty'   || r.status === 'both').length,
      missing: results.filter(r => r.status === 'missing').length,
      extra:   results.filter(r => r.status === 'extra').length,
    };

    // Summary bar
    const bar = document.getElementById('summaryBar');
    bar.innerHTML = `
      <div class="stat"><div class="num">${counts.all}</div><div class="lbl">Total Lines</div></div>
      <div class="stat ok"><div class="num">${counts.ok}</div><div class="lbl">Match</div></div>
      <div class="stat ${counts.price  ? 'warn' : ''}"><div class="num">${counts.price}</div><div class="lbl">Price Issues</div></div>
      <div class="stat ${counts.qty    ? 'warn' : ''}"><div class="num">${counts.qty}</div><div class="lbl">Qty Issues</div></div>
      <div class="stat ${counts.missing? 'warn' : ''}"><div class="num">${counts.missing}</div><div class="lbl">Missing</div></div>
      <div class="stat ${counts.extra  ? 'warn' : ''}"><div class="num">${counts.extra}</div><div class="lbl">Extra</div></div>
    `;

    // Filter tabs
    const tabs = document.getElementById('filterTabs');
    const filters = [
      { key: 'all',     label: `All (${counts.all})` },
      { key: 'issues',  label: `Issues Only (${counts.all - counts.ok})` },
      { key: 'ok',      label: `Match (${counts.ok})` },
      { key: 'price',   label: `Price (${counts.price})` },
      { key: 'qty',     label: `Qty (${counts.qty})` },
      { key: 'missing', label: `Missing (${counts.missing})` },
      { key: 'extra',   label: `Extra (${counts.extra})` },
    ];
    tabs.innerHTML = '';
    for (const f of filters) {
      const btn = document.createElement('button');
      btn.textContent = f.label;
      btn.className = f.key === currentFilter ? 'active' : '';
      btn.onclick = () => { currentFilter = f.key; renderTable(results); updateTabs(); };
      tabs.appendChild(btn);
    }

    renderTable(results);
    document.getElementById('results').classList.add('visible');
  }

  function updateTabs() {
    document.querySelectorAll('#filterTabs button').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.startsWith(currentFilter === 'all' ? 'All' :
        currentFilter === 'issues' ? 'Issues' :
        currentFilter === 'ok'     ? 'Match' :
        currentFilter === 'price'  ? 'Price' :
        currentFilter === 'qty'    ? 'Qty' :
        currentFilter === 'missing'? 'Missing' : 'Extra'));
    });
  }

  function filterResults(results) {
    if (currentFilter === 'all')     return results;
    if (currentFilter === 'issues')  return results.filter(r => r.status !== 'ok');
    if (currentFilter === 'price')   return results.filter(r => r.status === 'price' || r.status === 'both');
    if (currentFilter === 'qty')     return results.filter(r => r.status === 'qty'   || r.status === 'both');
    return results.filter(r => r.status === currentFilter);
  }

  function renderTable(results) {
    const filtered = filterResults(results);

    document.getElementById('resultsHead').innerHTML = `
      <tr>
        <th>Status</th>
        <th>Item #</th>
        <th>Description</th>
        <th>Invoice Qty</th><th>Cost Sheet Qty</th>
        <th>Invoice Price</th><th>Cost Sheet Price</th>
        <th>Invoice Total</th><th>Cost Sheet Total</th>
        <th>Notes</th>
      </tr>`;

    const tbody = document.getElementById('resultsBody');
    tbody.innerHTML = '';

    for (const r of filtered) {
      const tr = document.createElement('tr');

      const statusBadge = {
        ok:      '<span class="badge badge-ok">✓ Match</span>',
        price:   '<span class="badge badge-price">⚠ Price</span>',
        qty:     '<span class="badge badge-qty">⚠ Qty</span>',
        both:    '<span class="badge badge-price">⚠ Price+Qty</span>',
        missing: '<span class="badge badge-missing">✗ Missing</span>',
        extra:   '<span class="badge badge-extra">+ Extra</span>',
      }[r.status] || '';

      const fmtNum = (v, ref) => {
        if (v === null || v === undefined) return '<span style="color:#aaa">—</span>';
        const formatted = typeof v === 'number' ? v.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 }) : v;
        if (ref === null || ref === undefined || Math.abs(v - ref) <= 0.01) return formatted;
        const diff = v - ref;
        const cls  = diff > 0 ? 'diff-pos' : 'diff-neg';
        const sign = diff > 0 ? '+' : '';
        return `<span class="diff-val ${cls}">${formatted}</span> <span style="font-size:0.75rem;color:#888">(${sign}${diff.toFixed(2)})</span>`;
      };

      const costR = r.costRow || {};
      const notes = r.note || (r.issues || []).map(i =>
        `${i.field}: invoice ${i.inv}, cost ${i.cost}`).join('; ');

      tr.innerHTML = `
        <td>${statusBadge}</td>
        <td style="font-size:0.78rem">${esc(r.itemNo || costR.itemNo || '')}</td>
        <td>${esc(r.description || costR.description || '')}</td>
        <td>${fmtNum(r.qty,       costR.qty)}</td>
        <td>${fmtNum(costR.qty,   r.qty)}</td>
        <td>${fmtNum(r.unitPrice, costR.unitPrice)}</td>
        <td>${fmtNum(costR.unitPrice, r.unitPrice)}</td>
        <td>${fmtNum(r.total,     costR.total)}</td>
        <td>${fmtNum(costR.total, r.total)}</td>
        <td style="font-size:0.78rem;color:#555">${esc(notes)}</td>
      `;
      tbody.appendChild(tr);
    }

    if (filtered.length === 0) {
      tbody.innerHTML = `<tr><td colspan="10" style="text-align:center;color:#888;padding:30px;">No rows match this filter.</td></tr>`;
    }
  }

  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
